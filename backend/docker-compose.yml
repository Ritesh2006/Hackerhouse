version: '3.8'

services:
  backend:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - mongodb
      - redis
    networks:
      - hackerhouse-network

  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - hackerhouse-network

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    networks:
      - hackerhouse-network

networks:
  hackerhouse-network:
    driver: bridge

volumes:
  mongodb_data:
